name: 'Busbar — gh-env-scratch-ensure'
description: 'Inspect a stable scratch GitHub Environment slot and report whether it is ready for reuse.'
author: 'Busbar'

inputs:
  environment-name:
    description: 'GitHub Environment name. Defaults to the stable named slot `scratch`.'
    required: false
    default: 'scratch'
  repository:
    description: 'Target repository in owner/repo form. Empty = current repository.'
    required: false
    default: ''
  required-secrets:
    description: 'Comma-delimited secret names that must be present for the slot to be considered reusable.'
    required: false
    default: 'SF_ACCESS_TOKEN,SF_INSTANCE_URL,SF_USERNAME,SF_LOGIN_URL,SF_SCRATCH_ORG_ID,SF_SCRATCH_ORG_INFO_ID,BUSBAR_CREDENTIAL_CONTEXT'
  fail-if-not-ready:
    description: 'If true, fail when the environment is absent or missing any required secret names.'
    required: false
    default: 'false'
  # Authentication is EXCLUSIVELY via the Busbar GitHub App — this action never
  # uses GITHUB_TOKEN. The App mints a least-privilege, repo-pinned, read-only
  # installation token (environments:read + secrets:read).
  github-app-id:
    description: 'GitHub App id (REQUIRED). The App mints a least-privilege installation token for the target repo.'
    required: true
  github-app-private-key:
    description: 'GitHub App private key PEM (REQUIRED). Provide via a secret.'
    required: true
  version:
    description: 'Release tag of the gh-env-scratch-ensure binary.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo hosting prebuilt binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  environment_name:
    description: 'The GitHub Environment name that was inspected.'
    value: ${{ steps.ensure.outputs.environment_name }}
  repository:
    description: 'The repository that was inspected.'
    value: ${{ steps.ensure.outputs.repository }}
  environment_exists:
    description: 'Whether the environment exists.'
    value: ${{ steps.ensure.outputs.environment_exists }}
  slot_ready:
    description: 'Whether all required secret names are present in the environment.'
    value: ${{ steps.ensure.outputs.slot_ready }}
  missing_secrets:
    description: 'Comma-delimited required secret names that were missing.'
    value: ${{ steps.ensure.outputs.missing_secrets }}

# The binary owns all logic and UX: it reads its inputs from INPUT_* (and the
# auth/repo env vars below), inspects the environment, writes GITHUB_OUTPUT, the
# step summary and an annotation, and exits non-zero when fail-if-not-ready is
# set and the slot is not reusable. This action only installs it and passes
# inputs through.
runs:
  using: 'composite'
  steps:
    - name: Install the gh-env-scratch-ensure binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: gh-env-scratch-ensure
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Inspect the "${{ inputs.environment-name }}" GitHub Environment slot for reusable scratch-org secrets via the Busbar GitHub App
      id: ensure
      shell: bash
      env:
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_REQUIRED_SECRETS: ${{ inputs.required-secrets }}
        INPUT_FAIL_IF_NOT_READY: ${{ inputs.fail-if-not-ready }}
        # This action authenticates ONLY via the Busbar GitHub App. GITHUB_TOKEN is
        # never passed or used — the App mints a least-privilege, repo-pinned,
        # read-only installation token (environments:read + secrets:read).
        GH_APP_ID: ${{ inputs.github-app-id }}
        GH_APP_PRIVATE_KEY: ${{ inputs.github-app-private-key }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail
        echo "▶ TESTING: inspect the '${INPUT_ENVIRONMENT_NAME}' GitHub Environment slot in repo '${INPUT_REPOSITORY:-$GITHUB_REPOSITORY}' for required secrets [${INPUT_REQUIRED_SECRETS}] (fail-if-not-ready=${INPUT_FAIL_IF_NOT_READY})"
        # The binary owns the App-token mint, the environment+secrets inspection,
        # GITHUB_OUTPUT/summary/annotation, and the non-zero exit when
        # fail-if-not-ready is set and the slot is not reusable. Any non-zero exit
        # aborts the step — nothing is swallowed.
        gh-env-scratch-ensure
        echo "✓ RESULT: environment='${{ steps.ensure.outputs.environment_name }}' repository='${{ steps.ensure.outputs.repository }}' exists=${{ steps.ensure.outputs.environment_exists }} slot_ready=${{ steps.ensure.outputs.slot_ready }} missing_secrets='${{ steps.ensure.outputs.missing_secrets }}'"