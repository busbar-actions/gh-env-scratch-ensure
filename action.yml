name: 'Busbar — gh-env-scratch-ensure'
description: 'Inspect a stable scratch GitHub Environment slot and report whether it is ready for reuse.'
author: 'Busbar'

inputs:
  environment-name:
    description: 'GitHub Environment name. Defaults to the stable named slot `scratch`.'
    required: false
    default: 'scratch'
  repository:
    description: 'Target repository in owner/repo form. Empty = current repository.'
    required: false
    default: ''
  required-secrets:
    description: 'Comma-delimited secret names that must be present for the slot to be considered reusable.'
    required: false
    default: 'SF_ACCESS_TOKEN,SF_INSTANCE_URL,SF_USERNAME,SF_LOGIN_URL,SF_SCRATCH_ORG_ID,SF_SCRATCH_ORG_INFO_ID,BUSBAR_CREDENTIAL_CONTEXT'
  fail-if-not-ready:
    description: 'If true, fail when the environment is absent or missing any required secret names.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token with permission to inspect environments and environment secrets. Optional when using GitHub App credentials.'
    required: false
    default: ''
  github-app-id:
    description: 'GitHub App id used to mint an installation token for the target repository.'
    required: false
    default: ''
  github-app-private-key:
    description: 'GitHub App private key PEM used to mint an installation token.'
    required: false
    default: ''
  version:
    description: 'Release tag of the gh-env-scratch-ensure binary.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo hosting prebuilt binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

outputs:
  environment_name:
    description: 'The GitHub Environment name that was inspected.'
    value: ${{ steps.ensure.outputs.environment_name }}
  repository:
    description: 'The repository that was inspected.'
    value: ${{ steps.ensure.outputs.repository }}
  environment_exists:
    description: 'Whether the environment exists.'
    value: ${{ steps.ensure.outputs.environment_exists }}
  slot_ready:
    description: 'Whether all required secret names are present in the environment.'
    value: ${{ steps.ensure.outputs.slot_ready }}
  missing_secrets:
    description: 'Comma-delimited required secret names that were missing.'
    value: ${{ steps.ensure.outputs.missing_secrets }}

runs:
  using: 'composite'
  steps:
    - name: Resolve release tag
      id: tag
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.version }}" == "latest" ]]; then
          tag=$(gh release view --repo "${{ inputs.binary-repo }}" --json tagName -q .tagName)
        else
          tag="${{ inputs.version }}"
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Resolve binary asset name
      id: asset
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   name="gh-env-scratch-ensure-x86_64-unknown-linux-gnu" ;;
          Linux-ARM64) name="gh-env-scratch-ensure-aarch64-unknown-linux-gnu" ;;
          macOS-X64)   name="gh-env-scratch-ensure-x86_64-apple-darwin" ;;
          macOS-ARM64) name="gh-env-scratch-ensure-aarch64-apple-darwin" ;;
          Windows-X64) name="gh-env-scratch-ensure-x86_64-pc-windows-msvc.exe" ;;
          *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}" >&2; exit 1 ;;
        esac
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Download gh-env-scratch-ensure binary
      shell: bash
      run: |
        set -euo pipefail
        bin_dir="${RUNNER_TEMP}/gh-env-scratch-ensure"
        mkdir -p "$bin_dir"
        gh release download "${{ steps.tag.outputs.tag }}" \
          --repo "${{ inputs.binary-repo }}" \
          --pattern "${{ steps.asset.outputs.name }}" \
          --dir "$bin_dir"
        bin_path="$bin_dir/${{ steps.asset.outputs.name }}"
        chmod +x "$bin_path"
        echo "$bin_dir" >> "$GITHUB_PATH"
        if [[ "$bin_path" != "$bin_dir/gh-env-scratch-ensure" && "$bin_path" != "$bin_dir/gh-env-scratch-ensure.exe" ]]; then
          ext=""
          [[ "${{ runner.os }}" == "Windows" ]] && ext=".exe"
          ln -sf "$bin_path" "$bin_dir/gh-env-scratch-ensure$ext"
        fi
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Inspect scratch slot
      id: ensure
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        GH_APP_ID: ${{ inputs.github-app-id }}
        GH_APP_PRIVATE_KEY: ${{ inputs.github-app-private-key }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail
        args=()

        repo="${{ inputs.repository }}"
        if [[ -n "$repo" ]]; then
          args+=(--repository "$repo")
        fi

        env_name="${{ inputs.environment-name }}"
        if [[ -n "$env_name" ]]; then
          args+=(--environment-name "$env_name")
        fi

        required_secrets="${{ inputs.required-secrets }}"
        required_secrets="${required_secrets// /}"
        if [[ -n "$required_secrets" ]]; then
          args+=(--required-secrets "$required_secrets")
        fi

        if [[ "${{ inputs.fail-if-not-ready }}" == "true" ]]; then
          args+=(--fail-if-not-ready)
        fi

        gh-env-scratch-ensure "${args[@]}"